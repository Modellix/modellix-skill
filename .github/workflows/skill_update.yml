name: Skill Update

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    secrets:
      SMITHERY_TOKEN:
        required: false

jobs:
  sync-smithery:
    runs-on: ubuntu-latest
    steps:
      # Sync action 1/3: update Smithery registry via API.
      - name: Update Smithery skill
        env:
          SMITHERY_TOKEN: ${{ secrets[format('{0}', 'SMITHERY_TOKEN')] || '' }}
          SKILL_GIT_URL: https://github.com/Modellix/modellix-skill/tree/main/modellix-skill
        run: |
          if [ -z "$SMITHERY_TOKEN" ]; then
            echo "SMITHERY_TOKEN is not set. Please configure it in repository secrets."
            exit 1
          fi

          curl --fail-with-body --request PUT \
            --url "https://api.smithery.ai/skills/modellix/modellix-skill" \
            --header "Authorization: Bearer ${SMITHERY_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "{\"gitUrl\":\"${SKILL_GIT_URL}\"}"

      # Sync action 2/2: wait then run npx skills add.
      - name: Wait 60 seconds before adding skill
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: sleep 60

      - name: Add skill via npx
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx skills add https://github.com/Modellix/modellix-skill/tree/main/modellix-skill
